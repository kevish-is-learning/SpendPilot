name: SpendPilot CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Use Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20.x'
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    - name: Generate Prisma Client
      run: npx prisma generate

    - name: Check formatting (Prettier)
      run: npx prettier --check .

    - name: Run ESLint
      run: npm run lint

    - name: Run Type Check
      run: npx tsc --noEmit

    - name: Run Tests (Jest)
      run: npm run test

    - name: Build Next.js
      run: npm run build
      env:
        # Dummy database URL to allow Next.js type generation and build processes that might instantiate Prisma
        DATABASE_URL: "postgresql://postgres:postgres@localhost:5432/dummy"
